# Railway Blueprint for InboundAIVoice (Dockerfile + supervisord).
# Set Railway project Root Directory to this folder (`InboundAIVoice`).
# Railway injects PORT; uvicorn uses it in supervisord.conf.

[build]
builder = "dockerfile"

[deploy]
startCommand = "supervisord -n -c /app/supervisord.conf"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
